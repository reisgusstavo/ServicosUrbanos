<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Serviços Urbanos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-login">
 
<div class="login-panel">
 
    <!-- Sidebar -->
    <aside class="login-sidebar">
 
<div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height: 36px;">
    <span class="logo-text">Serviços Urbanos</span>
</div>
 
        <nav class="login-nav">
            <div class="login-nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8v-2a2 2 0 0 0-2-2h-7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2v-2"/><path d="M20 12h-13l3-3m0 6l-3-3"/></svg>
                Acesso
            </div>
            <div class="login-nav-divider"></div>
            <div class="login-nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Solicitações
            </div>
            <div class="login-nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
                Ocorrências
            </div>
            <div class="login-nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
                Configurações
            </div>
        </nav>
 
        <div class="login-sidebar-footer">
            <span class="login-status-dot"></span>
            <span class="login-status-text">Sistema online</span>
        </div>
 
    </aside>
 
    <!-- Main -->
    <main class="login-main">
 
        <div class="login-form-box">
 
            <p class="login-eyebrow">Painel de acesso</p>
            <h1>Bem-vindo</h1>
            <p class="auth-subtitle">Entre com suas credenciais para continuar.</p>
 
            <form action="/login" method="POST">
 
                <div class="login-field">
                    <label class="login-label">E-mail</label>
                    <input type="email" name="email" placeholder="seu@email.com" required>
                </div>
 
                <div class="login-field">
                    <label class="login-label">Senha</label>
                    <input type="password" name="senha" placeholder="••••••••" required>
                </div>
 
                <button type="submit">Entrar no painel</button>
 
                <div class="or-divider">ou</div>
 
                <a href="/cadastro">
                    <button type="button">Criar conta</button>
                </a>
 
            </form>
 
            <div class="login-form-footer">
                <div class="login-avatar">SES</div>
                <span class="login-footer-text">Secretaria de Serviços e Obras Públicas</span>
            </div>
 
        </div>
 
    </main>
 
</div>
 
</body>
</html>
